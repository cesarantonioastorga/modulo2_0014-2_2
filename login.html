<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio Sesión | Alke Wallet</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!--Estilos-->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <h1 class="text-center">Alke Wallet</h1>
    </header>
    <main>
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-8">
                    <div id="mensaje"></div>
                    <h2 class="text-center mb-4">Login</h2>
                    <form id="form-login">
                        <div class="mb-3">
                            <label for="usuario" class="form-label">Usuario</label>
                            <input type="text" name="usuario" class="form-control" id="usuario" placeholder="Ingrese su usuario">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Contraseña</label>
                            <input type="password" name="password" class="form-control" id="password" placeholder="Ingrese contraseña">
                        </div>
                        <button class="btn btn-primary mt-3 w-100">Iniciar sesión</button>
                    </form>
                    <div>
                        <p class="text-center pt-3">¿No tienes cuenta? <a href="register.html">Registrarse</a></p>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <p class="text-center">© 2026 Alke Wallet</p>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.getElementById("form-login").addEventListener("submit", function(event){
            event.preventDefault();

            const usuario= document.getElementById("usuario").value;
            const password= document.getElementById("password").value;

            let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

            const usuarioEncontrado = usuarios.find(function (user){
                return user.usuario === usuario && user.password === password;
            });

            if (usuarioEncontrado){
                localStorage.setItem("usuarioLogueado", JSON.stringify(usuarioEncontrado));

                document.getElementById("mensaje").innerHTML = `
                <div class="alert alert-success alert-dismissible fade show">
                    Inicio de sesión exitoso.
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                `;
                setTimeout(() => {
                    window.location.href = "menu.html"
                }, 3000);
            } else {
                document.getElementById("mensaje").innerHTML = `
                <div class="alert alert-danger alert-dismissible fade show">
                    Usuario y/o contraseña incorrectos.
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                `;

                setTimeout(() => {
                    document.getElementById("mensaje").innerHTML = "";
                }, 3000);
            }


        })
    </script>
</body>
</html>
