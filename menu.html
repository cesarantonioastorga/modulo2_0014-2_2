<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | Alke Wallet</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!--Fontawesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <!--Estilos-->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header class="d-flex justify-content-between align-items-center">
        <a href="menu.html" class="btn btn-success"><i class="fa-solid fa-reply"></i></a>
        <h1 class="text-center">Alke Wallet</h1>
        <button class="btn btn-danger" id="logout">
            <i class="fa-solid fa-power-off"></i>
        </button>
    </header>
    <main id="menu">
        <section class="container">
            <div class="row justify-content-center mb-5">
                <div class="col-12 col-lg-9">
                    <div class="card shadow-sm">
                        <div class="card-body text-center">
                            <h2>Saldo disponible</h2>
                            <span class="saldo"></span>
                            <p>Tu saldo actual</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row row-gap-3 justify-content-center">
                <div class="col-12 col-md-4 col-lg-3 text-center">
                    <div class="card">
                        <div class="card-body">
                            <i class="fa-solid fa-wallet fa-3x mb-3"></i>
                            <h3>Depositar</h3>
                            <p>Agregar dinero a tu billetera virtual.</p>
                            <a href="desposit.html" class="btn btn-success btn-sm">Depositar</a>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-md-4 col-lg-3 text-center">
                    <div class="card">
                        <div class="card-body">
                            <i class="fa-solid fa-paper-plane fa-3x mb-3"></i>
                            <h3>Enviar </h3>
                            <p>Realiza transferencias a otros usuarios.</p>
                            <a href="desposit.html" class="btn btn-success btn-sm">Enviar</a>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-md-4 col-lg-3 text-center">
                    <div class="card">
                        <div class="card-body">
                            <i class="fa-solid fa-clock-rotate-left fa-3x mb-3"></i>
                            <h3>Transacciones</h3>
                            <p>Consulta el historial de tus movimientos.</p>
                            <a href="desposit.html" class="btn btn-success btn-sm">Ver historial</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p class="text-center">© 2026 Alke Wallet</p>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        //Obtener saldo
        const saldo = Number(localStorage.getItem("saldo")) || 0;

        document.querySelector(".saldo").textContent = "$" + saldo.toLocaleString("es-CL");

        //Proteger página
        const usuarioLogueado = localStorage.getItem("usuarioLogueado");

        if(!usuarioLogueado){
            window.location.href = "login.html";
        }

    </script>

    <script src="assets/js/script.js"></script>
</body>
</html>
